<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaShop PRO</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
}

body {
    background: #f5f5f5;
}

/* HEADER */
header {
    background: #1E3A8A;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

header h1 {
    margin-left: 20px;
}

nav a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
    font-weight: bold;
}

/* HERO */
.hero {
    height: 80vh;
    background: url("https://images.unsplash.com/photo-1512436991641-6745cdb1723f") center/cover;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    text-align: center;
}

.hero h2 {
    font-size: 50px;
}

.hero button {
    margin-top: 20px;
    padding: 15px 30px;
    border: none;
    background: #F97316;
    color: white;
    font-size: 18px;
    cursor: pointer;
}

/* SECCIONES */
.section {
    padding: 50px;
}

.title {
    text-align: center;
    color: #1E3A8A;
    margin-bottom: 30px;
}

/* PRODUCTOS */
.products {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 30px;
}

.card {
    width: 260px;
    background: white;
    border-radius: 10px;
    overflow: hidden;
    transition: 0.3s;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

.card h3, .card p {
    padding: 10px;
}

.card button {
    margin: 10px;
    width: 90%;
    padding: 10px;
    background: #1E3A8A;
    color: white;
    border: none;
    cursor: pointer;
}

/* CARRITO */
.cart {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #F97316;
    color: white;
    padding: 10px;
    border-radius: 50%;
    cursor: pointer;
}

/* CONTACTO */
.contact {
    max-width: 500px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
}

/* WHATSAPP */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    padding: 15px;
    border-radius: 50%;
    text-decoration: none;
}

/* FOOTER */
footer {
    background: #1E3A8A;
    color: white;
    text-align: center;
    padding: 20px;
}

/* RESPONSIVE */
@media(max-width:768px){
    .products {
        flex-direction: column;
        align-items: center;
    }
}
</style>

</head>

<body>

<header>
    <h1>NovaShop</h1>
    <nav>
        <a href="#">Inicio</a>
        <a href="#tec">Tecnología</a>
        <a href="#moda">Moda</a>
        <a href="#contacto">Contacto</a>
    </nav>
</header>

<div class="cart">🛒</div>

<section class="hero">
    <div>
        <h2>Compra fácil, vive mejor</h2>
        <button onclick="alert('Producto agregado')">Comprar ahora</button>
    </div>
</section>

<!-- TECNOLOGIA -->
<section id="tec" class="section">
    <h2 class="title">Tecnología</h2>
    <div class="products">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">
            <h3>Smartphone</h3>
            <p>$300</p>
            <button onclick="addCart()">Agregar</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8">
            <h3>Laptop</h3>
            <p>$800</p>
            <button onclick="addCart()">Agregar</button>
        </div>

    </div>
</section>

<!-- MODA -->
<section id="moda" class="section">
    <h2 class="title">Moda Moderna</h2>
    <div class="products">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1521335629791-ce4aec67ddaf">
            <h3>Camiseta</h3>
            <p>$25</p>
            <button onclick="addCart()">Agregar</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f">
            <h3>Zapatillas</h3>
            <p>$60</p>
            <button onclick="addCart()">Agregar</button>
        </div>

    </div>
</section>

<!-- CONTACTO -->
<section id="contacto" class="section">
    <h2 class="title">Contacto</h2>

    <div class="contact">
        <p><strong>📍 Managua, Nicaragua</strong></p>
        <p><strong>📱 +505 54782556</strong></p>
        <p><strong>📧 contacto@novashop.com</strong></p>
    </div>
</section>

<a href="https://wa.me/50554782556" class="whatsapp">💬</a>

<footer>
    <p>NovaShop © 2026</p>
</footer>

<script>
function addCart(){
    alert("Producto agregado al carrito 🛒");
}
</script>

</body>
</html>
